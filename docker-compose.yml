services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradepilot
      POSTGRES_USER: tradepilot
      POSTGRES_PASSWORD: tradepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradepilot -d tradepilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tradepilot
      MINIO_ROOT_PASSWORD: change-this-local-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/minio-cors.xml:/config/minio-cors.xml:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tradepilot change-this-local-secret;
      mc mb --ignore-existing local/tradepilot-private;
      mc anonymous set none local/tradepilot-private;
      mc cors set local/tradepilot-private /config/minio-cors.xml;
      "

  migrate:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
      target: migration
    environment:
      DATABASE_URL: postgresql://tradepilot:tradepilot@postgres:5432/tradepilot?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run db:migrate:deploy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tradepilot:tradepilot@postgres:5432/tradepilot?schema=public
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_REGION: eu-central-1
      S3_BUCKET: tradepilot-private
      S3_ACCESS_KEY: tradepilot
      S3_SECRET_KEY: change-this-local-secret
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  minio_data:
